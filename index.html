<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Érettségi Tétel Kihúzó - ONLINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .subject-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; }
        @media (max-width: 768px) { .subject-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 480px) { .subject-grid { grid-template-columns: 1fr; } }
        .topic-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; }
        @media (max-width: 768px) { .topic-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 480px) { .topic-grid { grid-template-columns: repeat(3, 1fr); } }
        .drawn { background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%) !important; border-color: #f87171 !important; transform: scale(1.05) !important; box-shadow: 0 10px 30px rgba(248, 113, 113, 0.4) !important; }
        .online { animation: pulse 2s infinite; }
    </style>
</head>
<body class="bg-gradient-to-br from-emerald-50 via-blue-50 to-purple-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- HEADER -->
        <div class="text-center mb-16">
            <h1 class="text-4xl md:text-6xl font-black bg-gradient-to-r from-emerald-600 via-blue-600 to-purple-600 bg-clip-text text-transparent mb-6 drop-shadow-2xl">
                🎓 Érettségi Tétel Kihúzó
            </h1>
            <p class="text-xl md:text-2xl text-gray-700 mb-8 font-semibold">Valós idejű szinkron - mindenki látja! 🚀</p>
            
            <!-- ONLINE INDICATOR -->
            <div id="onlineIndicator" class="inline-flex items-center gap-4 bg-emerald-100 border-4 border-emerald-300 rounded-3xl px-8 py-4 mb-8 shadow-2xl backdrop-blur-sm font-bold text-xl online">
                <div class="w-6 h-6 bg-emerald-500 rounded-full animate-ping"></div>
                <span>🟢 ONLINE - Szinkronizálva</span>
                <span id="lastSync" class="bg-white/50 px-4 py-2 rounded-xl font-black text-emerald-700 ml-4">most</span>
            </div>
            
            <!-- ADMIN BUTTON -->
            <button id="adminBtn" class="bg-gradient-to-r from-red-500 to-red-600 hover:from-red-600 hover:to-red-700 text-white font-bold py-4 px-12 rounded-3xl text-xl shadow-2xl hover:shadow-3xl hover:scale-105 transition-all duration-300 inline-flex items-center gap-3">
                <i class="fas fa-crown text-2xl"></i>Admin Reset
            </button>
        </div>

        <!-- FŐMENÜ -->
        <div id="mainMenu" class="subject-grid mb-16"></div>

        <!-- TÉTELLISTA MODAL -->
        <div id="topicModal" class="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50 p-4 hidden">
            <div class="bg-white w-full max-w-6xl max-h-[90vh] rounded-4xl shadow-3xl overflow-hidden flex flex-col">
                <div class="bg-gradient-to-r from-emerald-500 to-blue-500 text-white p-8 sticky top-0 z-10">
                    <div class="flex items-center justify-between">
                        <div>
                            <h2 id="modalTitle" class="text-3xl md:text-4xl font-black mb-2"></h2>
                            <div id="drawnCount" class="text-2xl font-bold bg-white/30 px-6 py-3 rounded-2xl backdrop-blur-sm inline-flex items-center gap-2"></div>
                        </div>
                        <button id="closeTopicModal" class="text-3xl p-4 rounded-3xl hover:bg-white/30 transition-all hover:scale-110">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
                <div id="topicList" class="p-8 flex-1 overflow-y-auto topic-grid pb-24">
                    <!-- 30 TÉTEL -->
                </div>
            </div>
        </div>

        <!-- CONFIRM MODAL -->
        <div id="confirmModal" class="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50 p-4 hidden">
            <div class="bg-white p-12 rounded-4xl shadow-3xl max-w-lg w-full text-center">
                <div class="w-32 h-32 bg-yellow-100 rounded-4xl mx-auto mb-8 flex items-center justify-center shadow-2xl border-4 border-yellow-200">
                    <i class="fas fa-exclamation-triangle text-6xl text-yellow-500"></i>
                </div>
                <h3 id="confirmTitle" class="text-3xl font-black text-gray-800 mb-6 leading-tight"></h3>
                <p class="text-xl text-gray-600 mb-12 font-medium">Mindenki látni fogja valós időben! 🚀</p>
                <div class="flex gap-6">
                    <button id="confirmYes" class="flex-1 bg-gradient-to-r from-emerald-500 to-emerald-600 hover:from-emerald-600 hover:to-emerald-700 text-white font-black py-6 px-8 rounded-3xl text-xl shadow-2xl hover:shadow-3xl hover:scale-105 transition-all duration-300 flex items-center justify-center gap-3">
                        <i class="fas fa-check-double text-xl"></i>Igen, kihúzták!
                    </button>
                    <button id="confirmNo" class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 font-black py-6 px-8 rounded-3xl text-xl shadow-xl hover:shadow-2xl hover:scale-105 transition-all duration-300 flex items-center justify-center gap-3">
                        <i class="fas fa-times text-xl"></i>Mégse
                    </button>
                </div>
            </div>
        </div>

        <!-- ADMIN MODAL -->
        <div id="adminModal" class="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50 p-4 hidden">
            <div class="bg-white p-12 rounded-4xl shadow-3xl max-w-md w-full">
                <h3 class="text-4xl font-black text-gray-800 mb-8 text-center flex items-center justify-center gap-4">
                    <i class="fas fa-crown text-yellow-500 text-3xl"></i>Admin
                </h3>
                <input type="password" id="adminPass" placeholder="Admin jelszó" class="w-full p-6 border-4 border-gray-200 rounded-3xl text-2xl mb-8 focus:border-emerald-500 focus:outline-none focus:ring-4 focus:ring-emerald-100 text-center font-bold">
                <div class="flex gap-4">
                    <button id="adminResetBtn" class="flex-1 bg-gradient-to-r from-red-500 to-red-600 hover:from-red-600 hover:to-red-700 text-white font-black py-6 px-8 rounded-3xl text-xl shadow-2xl hover:shadow-3xl hover:scale-105 transition-all duration-300 flex items-center justify-center gap-3">
                        <i class="fas fa-broom text-xl"></i>RESET MINDEN
                    </button>
                    <button id="adminCloseBtn" class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 font-black py-6 px-8 rounded-3xl text-xl hover:scale-105 transition-all duration-300">
                        Mégse
                    </button>
                </div>
                <p class="text-sm text-gray-500 mt-4 text-center">Jelszó: <strong>admin2024</strong></p>
            </div>
        </div>
    </div>

    <!-- 🔥 FIREBASE REALTIME DATABASE -->
    <script type="module">
        // ✅ BEILLESZTETT URL!
        const firebaseConfig = {
            databaseURL: "https://erettsegi-c971a-default-rtdb.europe-west1.firebasedatabase.app/"
        };

        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, onValue, set } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        // INIT
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const topicsRef = ref(db, 'tetelek');

        // TÁRGYAK
        const subjects = {
            magyar: { name: '🇭🇺 Magyar Nyelv', short: 'Magyar', icon: '📚' },
            angol: { name: '🇬🇧 Angol Nyelv', short: 'Angol', icon: '🗣️' },
            szlovak: { name: '🇸🇰 Szlovák Nyelv', short: 'Szlovák', icon: '📖' },
            foldrajz: { name: '🌍 Földrajz', short: 'Földrajz', icon: '🌎' },
            tori: { name: '🏛️ Történelem', short: 'Történelem', icon: '🏺' },
            polgari: { name: '⚖️ Polgári', short: 'Polgári', icon: '📜' },
            biosz: { name: '🧬 Biológia', short: 'Biológia', icon: '🔬' },
            kemia: { name: '🧪 Kémia', short: 'Kémia', icon: '⚗️' },
            matek: { name: '📐 Matematika', short: 'Matek', icon: '📈' },
            informatika: { name: '💻 Informatika', short: 'Informatika', icon: '🖥️' }
        };

        let drawnTopics = {};
        let currentSubjectKey = null;
        let currentTopicNumber = null;
        const ADMIN_PASSWORD = 'admin2024'; // Változtasd meg!

        // 🔥 VALÓS IDEJŰ SZINKRONIZÁLÁS
        onValue(topicsRef, (snapshot) => {
            drawnTopics = snapshot.val() || {};
            updateMainMenu();
            if (currentSubjectKey) generateTopicList();
            document.getElementById('lastSync').textContent = new Date().toLocaleTimeString('hu-HU');
        }, { onlyOnce: false });

        // 🔥 TÉTEL JELÖLÉSE - MINDENKI LÁTJA!
        window.markTopicDrawn = async function(subject, topic) {
            if (!drawnTopics[subject]) drawnTopics[subject] = {};
            drawnTopics[subject][topic] = true;
            await set(topicsRef, drawnTopics);
        };

        // 🔥 RESET - MINDENKI LÁTJA!
        window.resetAllTopics = async function() {
            await set(topicsRef, {});
        };

        // FŐMENÜ GENERÁLÁS
        function updateMainMenu() {
            const menu = document.getElementById('mainMenu');
            menu.innerHTML = '';
            Object.entries(subjects).forEach(([key, subject]) => {
                const drawnCount = Object.keys(drawnTopics[key] || {}).length;
                const menuItem = document.createElement('div');
                menuItem.className = `bg-white/90 backdrop-blur-xl p-10 rounded-4xl shadow-2xl hover:shadow-3xl hover:scale-105 transition-all duration-400 cursor-pointer group border-4 border-white/50 hover:border-emerald-400 hover:bg-emerald-50 text-center`;
                menuItem.innerHTML = `
                    <div class="text-6xl mb-8 group-hover:scale-110 transition-transform duration-500">${subject.icon}</div>
                    <h3 class="text-2xl font-bold text-gray-800 mb-6 group-hover:text-emerald-600 transition-all duration-300">${subject.name}</h3>
                    <div class="text-4xl font-black">
                        <span class="text-red-500 drop-shadow-lg">${drawnCount}</span>
                        <span class="text-2xl text-gray-400 mx-2">/</span>
                        <span class="text-xl font-bold text-gray-600">30</span>
                    </div>
                `;
                menuItem.onclick = () => openTopicList(key);
                menu.appendChild(menuItem);
            });
        }

        // TÉTELLISTA MEGNYITÁSA
        function openTopicList(subjectKey) {
            currentSubjectKey = subjectKey;
            document.getElementById('modalTitle').textContent = subjects[subjectKey].name;
            generateTopicList();
            document.getElementById('topicModal').classList.remove('hidden');
        }

        // TÉTELLISTA GENERÁLÁS
        function generateTopicList() {
            const list = document.getElementById('topicList');
            const subjectTopics = drawnTopics[currentSubjectKey] || {};
            const drawnCount = Object.keys(subjectTopics).length;
            document.getElementById('drawnCount').innerHTML = `
                <span class="text-3xl font-black text-red-500">${drawnCount}</span>
                <span class="text-xl text-gray-500 mx-2">/</span>
                <span class="text-xl font-bold">30 kihúzva</span>
                <i class="fas fa-users text-white ml-3"></i>
            `;

            list.innerHTML = '';
            for (let i = 1; i <= 30; i++) {
                const isDrawn = subjectTopics[i];
                const topicDiv = document.createElement('div');
                topicDiv.className = `p-8 rounded-3xl cursor-pointer transition-all duration-400 border-4 shadow-xl group hover:shadow-2xl h-48 flex flex-col justify-center items-center ${
                    isDrawn ? 'drawn' : 'bg-white border-gray-200 hover:border-emerald-400 hover:bg-gradient-to-br hover:from-emerald-50 hover:to-blue-50 hover:scale-105'
                }`;
                
                topicDiv.innerHTML = `
                    <div class="text-6xl font-black mb-6 text-gray-800 group-hover:text-emerald-600 transition-all">${i}</div>
                    <div class="text-2xl font-bold mb-4 ${isDrawn ? 'text-red-600' : 'text-gray-800 group-hover:text-emerald-600'} tracking-wide">TÉTEL</div>
                    ${isDrawn ? 
                        '<div class="flex items-center gap-3 mt-auto"><i class="fas fa-check-circle text-4xl text-red-500 animate-ping"></i><span class="font-bold text-red-600 text-xl">KIHÚZTÁK!</span></div>' :
                        '<div class="opacity-0 group-hover:opacity-100 transition-all mt-auto"><i class="fas fa-play-circle text-5xl text-emerald-500"></i></div>'
                    }
                `;
                
                if (!isDrawn) {
                    topicDiv.onclick = () => confirmDraw(i);
                }
                
                list.appendChild(topicDiv);
            }
        }

        // MEGERŐSÍTŐ
        function confirmDraw(topicNum) {
            currentTopicNumber = topicNum;
            document.getElementById('confirmTitle').textContent = `${subjects[currentSubjectKey].name} - ${topicNum}. TÉTEL`;
            document.getElementById('confirmModal').classList.remove('hidden');
        }

        // EVENT LISTENERS
        document.addEventListener('DOMContentLoaded', function() {
            // Modal zárás
            document.querySelectorAll('#closeTopicModal, #confirmNo, #adminCloseBtn').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('#topicModal, #confirmModal, #adminModal').forEach(modal => modal.classList.add('hidden'));
                    currentTopicNumber = null;
                };
            });

            // IGEN gomb
            document.getElementById('confirmYes').onclick = () => {
                markTopicDrawn(currentSubjectKey, currentTopicNumber);
                document.getElementById('confirmModal').classList.add('hidden');
            };

            // Admin
            document.getElementById('adminBtn').onclick = () => document.getElementById('adminModal').classList.remove('hidden');
            document.getElementById('adminResetBtn').onclick = () => {
                const pass = document.getElementById('adminPass').value;
                if (pass === ADMIN_PASSWORD) {
                    document.getElementById('adminModal').classList.add('hidden');
                    if (confirm('⚠️ BIZTOSAN RESETELJÜK MINDEN TÉTET?\nMinden tárgyból törlődik!')) {
                        resetAllTopics();
                        alert('✅ RESET KÉSZ! Mindenki látja a változást!');
                    }
                } else {
                    alert('❌ Helytelen jelszó!');
                }
                document.getElementById('adminPass').value = '';
            };

            // Kattintás kívül
            ['topicModal', 'confirmModal', 'adminModal'].forEach(id => {
                document.getElementById(id).onclick = (e) => {
                    if (e.target.id === id) e.target.classList.add('hidden');
                };
            });

            // Inicializálás
            updateMainMenu();
        });
    </script>
</body>
</html>
