<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Érettségi Tétel követő - by NZS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { font-family: 'DM Sans', sans-serif; }
        h1, h2, h3, .font-display { font-family: 'Syne', sans-serif; }

        body { background: #0f1117; color: #f0f0f0; }

        .card-glass {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            transition: all 0.3s ease;
        }
        .card-glass:hover {
            background: rgba(255,255,255,0.09);
            border-color: rgba(99,231,180,0.5);
            transform: translateY(-3px);
            box-shadow: 0 20px 60px rgba(99,231,180,0.1);
        }

        .subject-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.25rem; }
        @media(max-width:640px){ .subject-grid { grid-template-columns: repeat(2,1fr); gap: .75rem; } }

        .topic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: .875rem; }
        @media(max-width:640px){ .topic-grid { grid-template-columns: repeat(2,1fr); } }

        .topic-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.25s ease;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .topic-card:hover:not(.drawn) {
            background: rgba(99,231,180,0.08);
            border-color: rgba(99,231,180,0.4);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(99,231,180,0.15);
        }
        .topic-card.drawn {
            background: rgba(239,68,68,0.12);
            border-color: rgba(239,68,68,0.4);
            cursor: default;
        }
        .topic-card.drawn:hover { transform: none; }

        .pulse-dot { animation: pulse-anim 2s infinite; }
        @keyframes pulse-anim {
            0%,100% { opacity:1; transform: scale(1); }
            50% { opacity:.6; transform: scale(1.1); }
        }

        .modal-backdrop {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(6px);
        }

        .modal-panel {
            background: #161820;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            overflow: hidden;
        }

        .progress-bar { height: 4px; background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #63e7b4, #60a5fa); transition: width .4s ease; border-radius: 99px; }

        input, textarea {
            background: rgba(255,255,255,0.06) !important;
            border: 1px solid rgba(255,255,255,0.12) !important;
            color: #f0f0f0 !important;
            border-radius: 10px !important;
            outline: none !important;
        }
        input:focus, textarea:focus {
            border-color: rgba(99,231,180,0.5) !important;
            box-shadow: 0 0 0 3px rgba(99,231,180,0.1) !important;
        }
        input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.3) !important; }

        .btn-green {
            background: linear-gradient(135deg, #63e7b4, #22d3ee);
            color: #0f1117;
            font-weight: 700;
            border-radius: 12px;
            transition: all 0.2s;
        }
        .btn-green:hover { opacity:.9; transform: scale(1.02); }

        .btn-red {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            font-weight: 700;
            border-radius: 12px;
            transition: all 0.2s;
        }
        .btn-red:hover { opacity:.9; transform: scale(1.02); }

        .btn-gray {
            background: rgba(255,255,255,0.1);
            color: #ccc;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.2s;
        }
        .btn-gray:hover { background: rgba(255,255,255,0.15); }

        /* Reset selector */
        .reset-subject-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: .75rem 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex; align-items: center; gap: .75rem;
        }
        .reset-subject-card.selected {
            background: rgba(239,68,68,0.12);
            border-color: rgba(239,68,68,0.5);
        }
        .reset-subject-card:hover { border-color: rgba(255,255,255,0.25); }
        .reset-topic-chip {
            display: inline-flex; align-items: center; justify-content: center;
            width: 40px; height: 40px;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            font-size: .8rem; font-weight: 700;
            cursor: pointer; transition: all 0.15s;
        }
        .reset-topic-chip.drawn-chip {
            background: rgba(239,68,68,0.15);
            border-color: rgba(239,68,68,0.4);
            color: #f87171;
        }
        .reset-topic-chip.selected-chip {
            background: rgba(239,68,68,0.5) !important;
            border-color: #ef4444 !important;
            color: white !important;
            transform: scale(1.1);
        }
        .reset-topic-chip:not(.drawn-chip) { opacity: 0.3; cursor: default; }

        /* Topic name editor table */
        .name-row { display: flex; align-items: center; gap: .5rem; padding: .4rem 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .name-row:last-child { border-bottom: none; }
        .name-num { min-width: 36px; font-weight: 700; color: #63e7b4; font-size: .9rem; }
        .name-input { flex:1; padding: .4rem .7rem; font-size: .85rem; }
    </style>
</head>
<body>
<div class="container mx-auto px-4 py-10 max-w-6xl">

    <!-- HEADER -->
    <div class="text-center mb-12">
        <h1 class="font-display text-5xl md:text-7xl font-extrabold mb-4" style="background: linear-gradient(135deg,#63e7b4,#60a5fa,#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">
            ÉRETTSÉGI - VÁG
        </h1>
        <p class="text-gray-400 text-lg mb-6">Tétel kihúzó — központi szinkron - FireBase, by Nagy Zsombor</p>

        <div class="inline-flex items-center gap-3 px-6 py-3 rounded-full mb-6" style="background:rgba(99,231,180,0.08); border:1px solid rgba(99,231,180,0.2);">
            <span class="w-2.5 h-2.5 rounded-full bg-emerald-400 pulse-dot"></span>
            <span class="text-emerald-400 font-semibold text-sm">ONLINE</span>
            <span class="text-gray-500 text-sm">·</span>
            <span id="lastSync" class="text-gray-400 text-sm">szinkronizálás...</span>
        </div>

        <div class="flex justify-center gap-3">
            <button id="adminBtn" class="btn-red px-6 py-2.5 text-sm flex items-center gap-2">
                <i class="fas fa-crown"></i> Admin
            </button>
        </div>
    </div>

    <!-- SUBJECT GRID -->
    <div id="mainMenu" class="subject-grid"></div>

    <!-- ─── TOPIC LIST MODAL ─── -->
    <div id="topicModal" class="fixed inset-0 modal-backdrop flex items-center justify-center z-50 p-4 hidden">
        <div class="modal-panel w-full max-w-5xl max-h-[92vh] flex flex-col">
            <div class="p-6 flex items-start justify-between" style="border-bottom:1px solid rgba(255,255,255,0.08);">
                <div class="flex-1">
                    <h2 id="modalTitle" class="font-display text-3xl font-bold mb-2"></h2>
                    <div class="flex items-center gap-3">
                        <div id="drawnCountBadge" class="text-sm px-3 py-1 rounded-full" style="background:rgba(239,68,68,0.15); color:#f87171; border:1px solid rgba(239,68,68,0.3);"></div>
                        <div class="progress-bar flex-1 max-w-xs">
                            <div id="progressFill" class="progress-fill" style="width:0%"></div>
                        </div>
                    </div>
                </div>
                <button id="closeTopicModal" class="btn-gray p-2.5 ml-4">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="topicList" class="p-6 flex-1 overflow-y-auto topic-grid pb-6"></div>
        </div>
    </div>

    <!-- ─── CONFIRM MODAL ─── -->
    <div id="confirmModal" class="fixed inset-0 modal-backdrop flex items-center justify-center z-50 p-4 hidden">
        <div class="modal-panel max-w-md w-full p-8 text-center">
            <div class="text-5xl mb-4">🎲</div>
            <h3 id="confirmTitle" class="font-display text-2xl font-bold mb-2"></h3>
            <p id="confirmTopicName" class="text-gray-400 mb-6 text-sm min-h-[1.5rem]"></p>
            <p class="text-gray-500 text-sm mb-8">Mindenki látni fogja valós időben!</p>
            <div class="flex gap-3">
                <button id="confirmYes" class="btn-green flex-1 py-3 flex items-center justify-center gap-2">
                    <i class="fas fa-check"></i> Igen, kihúzták!
                </button>
                <button id="confirmNo" class="btn-gray flex-1 py-3">Mégse</button>
            </div>
        </div>
    </div>

    <!-- ─── ADMIN MODAL ─── -->
    <div id="adminModal" class="fixed inset-0 modal-backdrop flex items-center justify-center z-50 p-4 hidden">
        <div class="modal-panel max-w-sm w-full p-8">
            <h3 class="font-display text-2xl font-bold mb-6 flex items-center gap-3">
                <i class="fas fa-crown text-yellow-400"></i> Admin
            </h3>
            <!-- Login form -->
            <div id="adminLoginSection">
                <input type="password" id="adminPass" placeholder="Jelszó" class="w-full p-3 mb-3 text-base">
                <div class="flex gap-3">
                    <button id="adminLoginBtn" class="btn-green flex-1 py-3 flex items-center justify-center gap-2">
                        <i class="fas fa-unlock"></i> Belépés
                    </button>
                    <button id="adminCloseBtn" class="btn-gray flex-1 py-3">Mégse</button>
                </div>
                <p id="adminPassError" class="text-red-400 text-xs mt-3 text-center hidden">❌ Helytelen jelszó!</p>
            </div>
            <!-- Admin actions – only visible after login -->
            <div id="adminActionsSection" class="hidden">
                <button id="adminResetAllBtn" class="btn-red w-full py-3 flex items-center justify-center gap-2 mb-2">
                    <i class="fas fa-broom"></i> Reset — összes kihúzás
                </button>
                <button id="adminResetSelectBtn" class="w-full py-3 flex items-center justify-center gap-2 mb-3 font-bold rounded-xl transition-all" style="background:rgba(239,100,68,0.2);border:1px solid rgba(239,100,68,0.4);color:#fb923c;">
                    <i class="fas fa-list-check"></i> Reset — kiválasztott tételek
                </button>
                <button id="editNamesBtn" class="btn-green w-full py-3 flex items-center justify-center gap-2 mb-3">
                    <i class="fas fa-pen"></i> Tételek neve szerkesztése
                </button>
                <button id="adminCloseBtn2" class="btn-gray w-full py-3">Bezárás</button>
            </div>
        </div>
    </div>

    <!-- ─── SELECTIVE RESET MODAL ─── -->
    <div id="selectiveResetModal" class="fixed inset-0 modal-backdrop flex items-center justify-center z-50 p-4 hidden">
        <div class="modal-panel w-full max-w-3xl max-h-[92vh] flex flex-col">
            <div class="p-6 flex items-center justify-between" style="border-bottom:1px solid rgba(255,255,255,0.08);">
                <div>
                    <h3 class="font-display text-2xl font-bold">🎯 Szelektív reset</h3>
                    <p class="text-gray-500 text-sm mt-1">Válaszd ki melyik kihúzott tételeket törlöd</p>
                </div>
                <button id="closeSelectiveReset" class="btn-gray p-2.5"><i class="fas fa-times"></i></button>
            </div>

            <!-- Subject tabs -->
            <div class="px-6 pt-4 pb-2 flex flex-wrap gap-2" id="resetSubjectTabs"></div>

            <!-- Topic chips for selected subject -->
            <div class="flex-1 overflow-y-auto px-6 pb-4">
                <div class="flex items-center justify-between mb-3 mt-2">
                    <span id="resetSubjectTitle" class="text-sm font-semibold text-gray-400"></span>
                    <div class="flex gap-2">
                        <button id="resetSelectAllDrawn" class="text-xs px-3 py-1.5 rounded-lg font-semibold" style="background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.3);">
                            Mind kijelöl
                        </button>
                        <button id="resetDeselectAll" class="text-xs px-3 py-1.5 rounded-lg font-semibold btn-gray">
                            Töröl mind
                        </button>
                    </div>
                </div>
                <div id="resetTopicChips" class="flex flex-wrap gap-2"></div>
            </div>

            <!-- Selected count + confirm -->
            <div class="p-6 flex items-center gap-4" style="border-top:1px solid rgba(255,255,255,0.08);">
                <div id="resetSelectedCount" class="text-sm text-gray-400 flex-1"></div>
                <button id="confirmSelectiveReset" class="btn-red px-8 py-3 flex items-center gap-2 disabled:opacity-40" disabled>
                    <i class="fas fa-rotate-left"></i> Reset kijelöltek
                </button>
                <button id="closeSelectiveReset2" class="btn-gray px-6 py-3">Mégse</button>
            </div>
        </div>
    </div>

    <!-- ─── EDIT NAMES MODAL ─── -->
    <div id="editNamesModal" class="fixed inset-0 modal-backdrop flex items-center justify-center z-50 p-4 hidden">
        <div class="modal-panel w-full max-w-2xl max-h-[92vh] flex flex-col">
            <div class="p-6 flex items-center justify-between" style="border-bottom:1px solid rgba(255,255,255,0.08);">
                <h3 class="font-display text-2xl font-bold">✏️ Tételek neve</h3>
                <button id="closeEditNames" class="btn-gray p-2.5"><i class="fas fa-times"></i></button>
            </div>

            <!-- Subject selector -->
            <div class="px-6 pt-4 pb-2 flex flex-wrap gap-2" id="editSubjectTabs"></div>

            <!-- Name inputs -->
            <div class="flex-1 overflow-y-auto px-6 pb-4" id="editNamesList"></div>

            <div class="p-6 flex gap-3" style="border-top:1px solid rgba(255,255,255,0.08);">
                <button id="saveNamesBtn" class="btn-green flex-1 py-3 flex items-center justify-center gap-2">
                    <i class="fas fa-save"></i> Mentés Firebase-be
                </button>
                <button id="closeEditNames2" class="btn-gray px-6 py-3">Mégse</button>
            </div>
        </div>
    </div>

</div>

<!-- 🔥 FIREBASE -->
<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getDatabase, ref, onValue, set, update, get } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

    const firebaseConfig = {
        databaseURL: "https://erettsegi-c971a-default-rtdb.europe-west1.firebasedatabase.app/"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const topicsRef = ref(db, 'tetelek');

    const subjects = {
        magyar:      { name: '🇭🇺 Magyar Nyelv',   icon: '📚' },
        angol:       { name: '🇬🇧 Angol Nyelv',    icon: '🗣️' },
        szlovak:     { name: '🇸🇰 Szlovák Nyelv',  icon: '📖' },
        foldrajz:    { name: '🌍 Földrajz',         icon: '🌎' },
        tori:        { name: '🏛️ Történelem',       icon: '🏺' },
        polgari:     { name: '⚖️ Polgári',          icon: '📜' },
        biosz:       { name: '🧬 Biológia',         icon: '🔬' },
        kemia:       { name: '🧪 Kémia',            icon: '⚗️' },
        matek:       { name: '📐 Matematika',       icon: '📈' },
        informatika: { name: '💻 Informatika',      icon: '🖥️' }
    };

    const ADMIN_PASS = 'VAGBigZ';
    let state = {};           // full firebase data
    let currentSubject = null;
    let currentTopic = null;
    let editSubject = Object.keys(subjects)[0];

    // ─── REALTIME SYNC ───
    onValue(topicsRef, snap => {
        state = snap.val() || {};
        renderMainMenu();
        if (currentSubject) renderTopicList();
        document.getElementById('lastSync').textContent =
            'szinkron: ' + new Date().toLocaleTimeString('hu-HU');
    });

    // ─── HELPERS ───
    function getDrawn(sub) {
        const d = state[sub] || {};
        return Object.values(d).filter(v => v && v.drawn).length;
    }
    function getName(sub, num) {
        return (state[sub] && state[sub][num] && state[sub][num].name) || '';
    }
    function isDrawn(sub, num) {
        return !!(state[sub] && state[sub][num] && state[sub][num].drawn);
    }

    // ─── MAIN MENU ───
    function renderMainMenu() {
        const menu = document.getElementById('mainMenu');
        menu.innerHTML = '';
        Object.entries(subjects).forEach(([key, sub]) => {
            const drawn = getDrawn(key);
            const pct = Math.round((drawn / 30) * 100);
            const card = document.createElement('div');
            card.className = 'card-glass rounded-2xl p-6 cursor-pointer text-center';
            card.innerHTML = `
                <div class="text-4xl mb-3">${sub.icon}</div>
                <div class="font-semibold text-sm text-gray-200 mb-3 leading-snug">${sub.name}</div>
                <div class="progress-bar mb-2"><div class="progress-fill" style="width:${pct}%"></div></div>
                <div class="text-xs text-gray-500">
                    <span class="text-red-400 font-bold text-sm">${drawn}</span>
                    <span class="text-gray-600"> / 30</span>
                    <span class="ml-2 text-gray-600">kihúzva</span>
                </div>
            `;
            card.onclick = () => openTopicList(key);
            menu.appendChild(card);
        });
    }

    // ─── TOPIC LIST ───
    function openTopicList(key) {
        currentSubject = key;
        document.getElementById('modalTitle').textContent = subjects[key].name;
        renderTopicList();
        document.getElementById('topicModal').classList.remove('hidden');
    }

    function renderTopicList() {
        const list = document.getElementById('topicList');
        const drawn = getDrawn(currentSubject);
        const pct = Math.round((drawn / 30) * 100);
        document.getElementById('drawnCountBadge').textContent = `${drawn} / 30 kihúzva`;
        document.getElementById('progressFill').style.width = pct + '%';

        list.innerHTML = '';
        for (let i = 1; i <= 30; i++) {
            const d = isDrawn(currentSubject, i);
            const name = getName(currentSubject, i);
            const card = document.createElement('div');
            card.className = 'topic-card' + (d ? ' drawn' : '');
            card.innerHTML = `
                <div class="flex items-start justify-between">
                    <span class="font-display font-bold text-2xl ${d ? 'text-red-400' : 'text-emerald-400'}">${i}.</span>
                    ${d ? '<i class="fas fa-check-circle text-red-400 text-lg mt-1"></i>' : '<i class="fas fa-circle text-gray-700 text-xs mt-2"></i>'}
                </div>
                <div>
                    ${name
                        ? `<div class="text-xs font-medium leading-snug ${d ? 'text-red-300' : 'text-gray-300'}" style="word-break:break-word;">${name}</div>`
                        : `<div class="text-xs text-gray-600 italic">nincs cím</div>`
                    }
                    ${d ? '<div class="text-xs font-bold text-red-400 mt-1">KIHÚZTÁK</div>' : ''}
                </div>
            `;
            if (!d) card.onclick = () => openConfirm(i);
            list.appendChild(card);
        }
    }

    // ─── CONFIRM ───
    function openConfirm(num) {
        currentTopic = num;
        const name = getName(currentSubject, num);
        document.getElementById('confirmTitle').textContent =
            `${subjects[currentSubject].name} — ${num}. tétel`;
        document.getElementById('confirmTopicName').textContent = name || '';
        document.getElementById('confirmModal').classList.remove('hidden');
    }

    // ─── MARK DRAWN ───
    async function markDrawn(sub, num) {
        const path = `tetelek/${sub}/${num}`;
        const r = ref(db, path);
        const snap = await get(r);
        const existing = snap.val() || {};
        await set(r, { ...existing, drawn: true });
    }

    // ─── RESET ALL ───
    async function resetAll() {
        const updates = {};
        Object.keys(subjects).forEach(sub => {
            for (let i = 1; i <= 30; i++) {
                const name = getName(sub, i);
                updates[`tetelek/${sub}/${i}`] = name ? { name, drawn: false } : { drawn: false };
            }
        });
        await update(ref(db), updates);
    }

    // ─── SELECTIVE RESET ───
    let resetSubject = Object.keys(subjects)[0];
    let selectedForReset = new Set(); // "sub:num" strings

    function openSelectiveReset() {
        selectedForReset = new Set();
        resetSubject = Object.keys(subjects)[0];
        renderResetSubjectTabs();
        renderResetTopicChips();
        document.getElementById('selectiveResetModal').classList.remove('hidden');
    }

    function renderResetSubjectTabs() {
        const tabs = document.getElementById('resetSubjectTabs');
        tabs.innerHTML = '';
        Object.entries(subjects).forEach(([key, sub]) => {
            const drawn = getDrawn(key);
            const btn = document.createElement('button');
            btn.className = `px-3 py-1.5 rounded-lg text-xs font-semibold transition-all flex items-center gap-1.5 ${
                key === resetSubject
                    ? 'bg-red-500/20 text-red-400 border border-red-500/40'
                    : 'bg-white/5 text-gray-400 border border-white/10 hover:border-white/20'
            }`;
            btn.innerHTML = `${sub.name} ${drawn > 0 ? `<span class="text-red-400 font-bold">${drawn}</span>` : ''}`;
            btn.onclick = () => { resetSubject = key; renderResetSubjectTabs(); renderResetTopicChips(); };
            tabs.appendChild(btn);
        });
    }

    function renderResetTopicChips() {
        const container = document.getElementById('resetTopicChips');
        container.innerHTML = '';
        document.getElementById('resetSubjectTitle').textContent = subjects[resetSubject].name;

        for (let i = 1; i <= 30; i++) {
            const d = isDrawn(resetSubject, i);
            const key = `${resetSubject}:${i}`;
            const selected = selectedForReset.has(key);
            const chip = document.createElement('div');
            chip.className = `reset-topic-chip ${d ? 'drawn-chip' : ''} ${selected ? 'selected-chip' : ''}`;
            const name = getName(resetSubject, i);
            chip.title = name || `${i}. tétel`;
            chip.textContent = i;
            if (d) {
                chip.onclick = () => {
                    if (selectedForReset.has(key)) selectedForReset.delete(key);
                    else selectedForReset.add(key);
                    renderResetTopicChips();
                    updateResetCount();
                };
            }
            container.appendChild(chip);
        }
        updateResetCount();
    }

    function updateResetCount() {
        const count = selectedForReset.size;
        document.getElementById('resetSelectedCount').textContent =
            count > 0 ? `${count} tétel kijelölve resetelésre` : 'Kattints a piros tételekre a kijelöléshez';
        document.getElementById('confirmSelectiveReset').disabled = count === 0;
    }

    document.getElementById('resetSelectAllDrawn').onclick = () => {
        for (let i = 1; i <= 30; i++) {
            if (isDrawn(resetSubject, i)) selectedForReset.add(`${resetSubject}:${i}`);
        }
        renderResetTopicChips();
    };
    document.getElementById('resetDeselectAll').onclick = () => {
        for (let i = 1; i <= 30; i++) selectedForReset.delete(`${resetSubject}:${i}`);
        renderResetTopicChips();
    };

    document.getElementById('confirmSelectiveReset').onclick = async () => {
        if (selectedForReset.size === 0) return;
        const updates = {};
        selectedForReset.forEach(key => {
            const [sub, num] = key.split(':');
            const name = getName(sub, parseInt(num));
            updates[`tetelek/${sub}/${num}`] = name ? { name, drawn: false } : { drawn: false };
        });
        await update(ref(db), updates);
        selectedForReset = new Set();
        document.getElementById('selectiveResetModal').classList.add('hidden');
        alert(`✅ ${Object.keys(updates).length} tétel sikeresen resetelve!`);
    };

    function closeSelectiveReset() {
        document.getElementById('selectiveResetModal').classList.add('hidden');
    }
    document.getElementById('closeSelectiveReset').onclick = closeSelectiveReset;
    document.getElementById('closeSelectiveReset2').onclick = closeSelectiveReset;

    // ─── EDIT NAMES MODAL ───
    function openEditNames() {
        renderEditSubjectTabs();
        renderEditNamesList();
        document.getElementById('editNamesModal').classList.remove('hidden');
    }

    function renderEditSubjectTabs() {
        const tabs = document.getElementById('editSubjectTabs');
        tabs.innerHTML = '';
        Object.entries(subjects).forEach(([key, sub]) => {
            const btn = document.createElement('button');
            btn.className = `px-3 py-1.5 rounded-lg text-xs font-semibold transition-all ${
                key === editSubject
                    ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/40'
                    : 'bg-white/5 text-gray-400 border border-white/10 hover:border-white/20'
            }`;
            btn.textContent = sub.name;
            btn.onclick = () => { editSubject = key; renderEditSubjectTabs(); renderEditNamesList(); };
            tabs.appendChild(btn);
        });
    }

    function renderEditNamesList() {
        const container = document.getElementById('editNamesList');
        container.innerHTML = '';
        for (let i = 1; i <= 30; i++) {
            const name = getName(editSubject, i);
            const row = document.createElement('div');
            row.className = 'name-row';
            row.innerHTML = `
                <span class="name-num">${i}.</span>
                <input class="name-input" id="name_${i}" type="text" placeholder="Tétel neve (opcionális)" value="${name ? name.replace(/"/g, '&quot;') : ''}">
            `;
            container.appendChild(row);
        }
    }

    async function saveNames() {
        const btn = document.getElementById('saveNamesBtn');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Mentés...';
        btn.disabled = true;

        const updates = {};
        for (let i = 1; i <= 30; i++) {
            const val = document.getElementById(`name_${i}`).value.trim();
            const drawn = isDrawn(editSubject, i);
            updates[`tetelek/${editSubject}/${i}`] = {
                name: val || null,
                drawn: drawn || false
            };
        }
        await update(ref(db), updates);

        btn.innerHTML = '<i class="fas fa-check"></i> Elmentve!';
        setTimeout(() => {
            btn.innerHTML = '<i class="fas fa-save"></i> Mentés Firebase-be';
            btn.disabled = false;
        }, 1500);
    }

    // ─── EVENT LISTENERS ───
    document.getElementById('closeTopicModal').onclick = () => {
        document.getElementById('topicModal').classList.add('hidden');
        currentSubject = null;
    };
    document.getElementById('confirmNo').onclick = () => {
        document.getElementById('confirmModal').classList.add('hidden');
        currentTopic = null;
    };
    document.getElementById('confirmYes').onclick = async () => {
        await markDrawn(currentSubject, currentTopic);
        document.getElementById('confirmModal').classList.add('hidden');
        currentTopic = null;
    };

    function closeAdmin() {
        document.getElementById('adminModal').classList.add('hidden');
        document.getElementById('adminLoginSection').classList.remove('hidden');
        document.getElementById('adminActionsSection').classList.add('hidden');
        document.getElementById('adminPass').value = '';
        document.getElementById('adminPassError').classList.add('hidden');
    }

    document.getElementById('adminBtn').onclick = () =>
        document.getElementById('adminModal').classList.remove('hidden');
    document.getElementById('adminCloseBtn').onclick = closeAdmin;
    document.getElementById('adminCloseBtn2').onclick = closeAdmin;

    document.getElementById('adminLoginBtn').onclick = () => {
        const pass = document.getElementById('adminPass').value;
        if (pass !== ADMIN_PASS) {
            document.getElementById('adminPassError').classList.remove('hidden');
            document.getElementById('adminPass').value = '';
            return;
        }
        document.getElementById('adminPassError').classList.add('hidden');
        document.getElementById('adminLoginSection').classList.add('hidden');
        document.getElementById('adminActionsSection').classList.remove('hidden');
    };

    // Enter key on password field
    document.getElementById('adminPass').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('adminLoginBtn').click();
    });

    document.getElementById('adminResetAllBtn').onclick = async () => {
        if (!confirm('⚠️ Biztosan törlöd AZ ÖSSZES kihúzást? (A nevek megmaradnak)')) return;
        closeAdmin();
        await resetAll();
        alert('✅ Reset kész!');
    };

    document.getElementById('adminResetSelectBtn').onclick = () => {
        closeAdmin();
        openSelectiveReset();
    };

    document.getElementById('editNamesBtn').onclick = () => {
        closeAdmin();
        openEditNames();
    };
    document.getElementById('closeEditNames').onclick = () =>
        document.getElementById('editNamesModal').classList.add('hidden');
    document.getElementById('closeEditNames2').onclick = () =>
        document.getElementById('editNamesModal').classList.add('hidden');
    document.getElementById('saveNamesBtn').onclick = saveNames;

    // Close on backdrop click
    ['topicModal','confirmModal','adminModal','editNamesModal','selectiveResetModal'].forEach(id => {
        document.getElementById(id).addEventListener('click', e => {
            if (e.target.id === id) e.target.classList.add('hidden');
        });
    });
</script>
</body>
</html>
