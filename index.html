<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Érettségi Tétel Kihúzó</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .subject-grid { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
        @media (max-width: 768px) { .subject-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 480px) { .subject-grid { grid-template-columns: 1fr; } }
        .topic-grid { grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); }
        @media (max-width: 768px) { .topic-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 480px) { .topic-grid { grid-template-columns: repeat(3, 1fr); } }
        .drawn { background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%) !important; border-color: #f87171 !important; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- Header -->
        <div class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent mb-4">
                🎓 Érettségi Tétel Kihúzó
            </h1>
            <p class="text-xl text-gray-600 mb-8">Kattints → 30 tétel → jelöld be! 🎯</p>
            
            <button id="adminBtn" class="bg-gradient-to-r from-red-500 to-red-600 hover:from-red-600 hover:to-red-700 text-white font-bold py-3 px-8 rounded-2xl text-lg shadow-xl hover:shadow-2xl transform hover:scale-105 transition-all duration-300 mb-8">
                <i class="fas fa-crown mr-2"></i>Admin
            </button>

            <!-- Admin Panel -->
            <div id="adminPanel" class="hidden bg-red-50 border-4 border-red-200 rounded-3xl p-8 mb-12 shadow-2xl">
                <h3 class="text-3xl font-bold text-red-800 mb-6">👑 ADMIN MÓD</h3>
                <button id="resetAllBtn" class="w-full bg-gradient-to-r from-red-500 to-red-700 text-white font-bold py-4 px-8 rounded-2xl text-xl shadow-2xl hover:shadow-3xl hover:scale-105 transition-all duration-300">
                    <i class="fas fa-broom mr-3"></i>RESET MINDEN TÉTEL
                </button>
            </div>

            <!-- Password Modal -->
            <div id="passwordModal" class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 hidden">
                <div class="bg-white p-10 rounded-3xl shadow-3xl max-w-sm w-full mx-4">
                    <h3 class="text-3xl font-bold text-gray-800 mb-8 text-center">🔐 Admin</h3>
                    <input type="password" id="adminPassword" placeholder="Jelszó" class="w-full p-5 border-3 border-gray-200 rounded-2xl text-xl mb-8 focus:border-blue-500 focus:outline-none">
                    <div class="flex gap-4">
                        <button id="loginBtn" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 rounded-2xl text-lg">Belépés</button>
                        <button id="closeModalBtn" class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-4 rounded-2xl text-lg">Mégse</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- FŐMENÜ -->
        <div id="mainMenu" class="grid subject-grid gap-6 mb-12">
            <!-- Tárgyak betöltődnek -->
        </div>

        <!-- TÉTELLISTA MODAL -->
        <div id="topicModal" class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 hidden">
            <div class="bg-white rounded-4xl shadow-3xl w-full max-w-6xl max-h-[95vh] overflow-y-auto mx-4">
                <div class="sticky top-0 bg-gradient-to-r from-blue-500 to-purple-600 text-white p-8 rounded-t-4xl">
                    <div class="flex items-center justify-between">
                        <div>
                            <h2 id="modalTitle" class="text-4xl font-bold mb-2"></h2>
                            <div id="drawnCounter" class="text-2xl font-bold"></div>
                        </div>
                        <button id="closeTopicModal" class="text-3xl hover:scale-110 p-4 rounded-2xl hover:bg-white/20 transition-all">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
                <div class="p-8">
                    <div id="topicList" class="grid topic-grid gap-6">
                        <!-- 30 TÉTEL MINDIG MEGJELENIK! -->
                    </div>
                </div>
            </div>
        </div>

        <!-- MEGERŐSÍTŐ MODAL -->
        <div id="confirmModal" class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 hidden">
            <div class="bg-white p-10 rounded-3xl shadow-3xl max-w-lg w-full mx-4 text-center">
                <div class="w-28 h-28 bg-yellow-100 rounded-3xl flex items-center justify-center mx-auto mb-8">
                    <i class="fas fa-exclamation-triangle text-5xl text-yellow-500"></i>
                </div>
                <h3 id="confirmTitle" class="text-3xl font-bold text-gray-800 mb-6"></h3>
                <p id="confirmText" class="text-xl text-gray-600 mb-10">Biztos kihúzták?</p>
                <div class="flex gap-4">
                    <button id="confirmYes" class="flex-1 bg-gradient-to-r from-green-500 to-green-600 hover:from-green-600 hover:to-green-700 text-white font-bold py-5 px-8 rounded-2xl text-xl shadow-2xl hover:shadow-3xl transform hover:scale-105 transition-all duration-300">
                        <i class="fas fa-check mr-2"></i>Igen!
                    </button>
                    <button id="confirmNo" class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-5 px-8 rounded-2xl text-xl shadow-xl hover:shadow-2xl transform hover:scale-105 transition-all duration-300">
                        <i class="fas fa-times mr-2"></i>Mégse
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ★★★ JAVÍTOTT JAVASCRIPT ★★★
        
        const ADMIN_PASSWORD = 'VAGBigZ';
        const subjects = {
            magyar: { name: '🇭🇺 Magyar', topics: 30 },
            angol: { name: '🇬🇧 Angol', topics: 30 },
            szlovak: { name: '🇸🇰 Szlovák', topics: 30 },
            foldrajz: { name: '🌍 Földrajz', topics: 30 },
            tori: { name: '🏛️ Történelem', topics: 30 },
            polgari: { name: '⚖️ Polgári', topics: 30 },
            biosz: { name: '🧬 Biológia', topics: 30 },
            kemia: { name: '🧪 Kémia', topics: 30 },
            matek: { name: '📐 Matek', topics: 30 },
            informatika: { name: '💻 Infó', topics: 30 }
        };

        let currentSubject = null;
        let currentTopicNumber = null;
        let drawnTopics = JSON.parse(localStorage.getItem('drawnTopics') || '{}');

        // ★★★ INICIALIZÁLÁS ★★★
        document.addEventListener('DOMContentLoaded', initApp);

        function initApp() {
            generateMainMenu();
            setupEventListeners();
        }

        // ★★★ FŐMENÜ ★★★
        function generateMainMenu() {
            const mainMenu = document.getElementById('mainMenu');
            mainMenu.innerHTML = '';

            Object.entries(subjects).forEach(([key, subject]) => {
                const drawnCount = Object.keys(drawnTopics[key] || {}).length;
                
                const div = document.createElement('div');
                div.className = 'bg-white/90 backdrop-blur-xl border-4 border-white/50 rounded-3xl p-10 shadow-2xl hover:shadow-3xl hover:scale-105 hover:border-blue-300 transition-all duration-400 cursor-pointer group hover:bg-blue-50 text-center';
                div.innerHTML = `
                    <div class="text-6xl mb-6 group-hover:scale-110 transition-all">${subject.name.split(' ')[0]}</div>
                    <h3 class="text-2xl font-bold text-gray-800 mb-6 group-hover:text-blue-600">${subject.name.slice(2)}</h3>
                    <div class="text-3xl">
                        <span class="text-4xl font-black text-red-500">${drawnCount}</span>/30
                    </div>
                `;
                div.onclick = () => openTopicModal(key);
                mainMenu.appendChild(div);
            });
        }

        // ★★★ TÉTELLISTA ★★★
        function openTopicModal(subjectKey) {
            currentSubject = subjectKey;
            document.getElementById('modalTitle').textContent = subjects[subjectKey].name;
            generateTopicList();
            document.getElementById('topicModal').classList.remove('hidden');
            updateDrawnCounter();
        }

        function generateTopicList() {
            const container = document.getElementById('topicList');
            const subjectDrawn = drawnTopics[currentSubject] || {};
            container.innerHTML = '';

            for (let i = 1; i <= 30; i++) {
                const isDrawn = subjectDrawn[i];
                const div = document.createElement('div');
                div.className = `p-8 rounded-3xl cursor-pointer transition-all duration-400 border-4 shadow-xl group hover:shadow-2xl ${
                    isDrawn ? 'drawn scale-105' : 'border-gray-200 bg-white hover:border-blue-400 hover:bg-blue-50 hover:scale-105'
                }`;
                
                div.innerHTML = `
                    <div class="flex flex-col h-full justify-center items-center text-center">
                        <div class="text-4xl mb-4">${i}</div>
                        <h4 class="text-2xl font-black text-gray-800 group-hover:text-blue-600 mb-4">TÉTEL</h4>
                        ${isDrawn ? 
                            '<div class="flex items-center gap-3"><i class="fas fa-check-circle text-4xl text-red-500"></i><span class="text-xl font-bold text-red-600">KIHÚZTÁK!</span></div>' : 
                            '<i class="fas fa-play-circle text-4xl text-blue-500 opacity-0 group-hover:opacity-100 transition-opacity"></i>'
                        }
                    </div>
                `;
                
                if (!isDrawn) {
                    div.onclick = () => showConfirm(i);  // ★★★ EZ MŰKÖDIK ★★★
                }
                
                container.appendChild(div);
            }
        }

        // ★★★ MEGERŐSÍTŐ ★★★
        function showConfirm(topicNum) {
            currentTopicNumber = topicNum;
            document.getElementById('confirmTitle').textContent = `${subjects[currentSubject].name} - ${topicNum}. TÉTEL`;
            document.getElementById('confirmModal').classList.remove('hidden');
        }

        // ★★★ IGEN GOMB - EZ JELÖLI BE! ★★★
        function markDrawn() {
            if (!currentSubject || !currentTopicNumber) return;
            
            if (!drawnTopics[currentSubject]) drawnTopics[currentSubject] = {};
            drawnTopics[currentSubject][currentTopicNumber] = true;
            
            localStorage.setItem('drawnTopics', JSON.stringify(drawnTopics));
            
            // Frissítések
            generateTopicList();
            updateDrawnCounter();
            generateMainMenu();
            closeConfirmModal();
            
            console.log(`✅ ${currentSubject} ${currentTopicNumber}. tétel jelölve!`);
        }

        function updateDrawnCounter() {
            const count = Object.keys(drawnTopics[currentSubject] || {}).length;
            document.getElementById('drawnCounter').textContent = `${count}/30 kihúzva`;
        }

        // ★★★ EVENT LISTENERS ★★★
        function setupEventListeners() {
            // Modals
            document.getElementById('closeTopicModal').onclick = closeTopicModal;
            document.getElementById('closeModalBtn').onclick = () => document.getElementById('passwordModal').classList.add('hidden');
            document.getElementById('confirmNo').onclick = closeConfirmModal;
            document.getElementById('confirmYes').onclick = markDrawn;  // ★★★ EZ A KULCS ★★★

            // Admin
            document.getElementById('adminBtn').onclick = () => document.getElementById('passwordModal').classList.remove('hidden');
            document.getElementById('loginBtn').onclick = checkAdminPassword;
            document.getElementById('resetAllBtn').onclick = resetAll;

            // Kattintás kívül
            ['topicModal', 'confirmModal', 'passwordModal'].forEach(id => {
                document.getElementById(id).onclick = (e) => {
                    if (e.target.id === id) closeAllModals();
                };
            });
        }

        function checkAdminPassword() {
            const pw = document.getElementById('adminPassword').value;
            if (pw === ADMIN_PASSWORD) {
                document.getElementById('adminPanel').classList.remove('hidden');
                document.getElementById('passwordModal').classList.add('hidden');
            } else {
                alert('❌ Rossz jelszó!');
            }
            document.getElementById('adminPassword').value = '';
        }

        function resetAll() {
            if (confirm('⚠️ MINDEN TÉTET TÖRLÜNK?')) {
                localStorage.removeItem('drawnTopics');
                drawnTopics = {};
                generateMainMenu();
                closeAllModals();
                alert('✅ RESET KÉSZ!');
            }
        }

        function closeAllModals() {
            document.getElementById('topicModal').classList.add('hidden');
            document.getElementById('confirmModal').classList.add('hidden');
            document.getElementById('passwordModal').classList.add('hidden');
        }

        function closeTopicModal() {
            document.getElementById('topicModal').classList.add('hidden');
        }

        function closeConfirmModal() {
            document.getElementById('confirmModal').classList.add('hidden');
            currentTopicNumber = null;
        }
    </script>
</body>
</html>
